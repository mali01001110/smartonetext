<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartOneText</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000000;
            color: #00ff66;
        }

        .container {
            max-width: 700px;
            margin: 80px auto;
            padding: 30px;
            border: 1px solid #00ff66;
            border-radius: 14px;
            background: #0b0b0b;
            box-shadow: 0 0 18px rgba(0, 255, 102, 0.25);
            text-align: center;
        }

        h1 {
            color: #00ff88;
            font-size: 42px;
            margin-bottom: 10px;
        }

        h2 {
            color: #00ff66;
            font-weight: normal;
            margin-bottom: 25px;
        }

        p {
            color: #80ffc0;
            line-height: 1.6;
            font-size: 18px;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 22px;
            background: #00ff66;
            color: #000000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .button:hover {
            background: #33ff85;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #55cc88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SmartOneText</h1>
        <h2>Anonymous Messages. Public Feed.</h2>

        <p>
            Welcome to SmartOneText, a simple place where users can leave anonymous messages
            using a username. Messages are saved with the date and time and can be viewed by everyone.
        </p>

        <a class="button" href="/">Open SmartOneText</a>

        <div class="footer">
            Created with Django
        </div>
    </div>
</body>
</html>
