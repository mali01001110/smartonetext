<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ site_name }} - Message Feed</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000000;
            color: #00ff66;
        }

        .container {
            max-width: 850px;
            margin: 60px auto;
            padding: 28px;
            border: 1px solid #00ff66;
            border-radius: 14px;
            background: #0b0b0b;
            box-shadow: 0 0 18px rgba(0, 255, 102, 0.25);
        }

        h1, h2 {
            margin-top: 0;
            color: #00ff88;
        }

        a {
            color: #66ffad;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .message-card {
            border: 1px solid #00ff66;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            background: #000;
        }

        .meta {
            color: #7dffbf;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .text {
            color: #32ff8f;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .empty {
            color: #80ffc0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ site_name }}</h1>
        <h2>Public Message Feed</h2>

        <p><a href="{% url 'index' %}">Leave a new message</a></p>

        {% if messages %}
            {% for m in messages %}
                <div class="message-card">
                    <div class="meta">
                        <strong>{{ m.username }}</strong> • {{ m.created_at|date:"Y-m-d H:i:s" }}
                    </div>
                    <div class="text">{{ m.message }}</div>
                </div>
            {% endfor %}
        {% else %}
            <p class="empty">No messages yet.</p>
        {% endif %}
    </div>
</body>
</html>
