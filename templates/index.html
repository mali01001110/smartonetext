<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ site_name }} - Send Message</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000000;
            color: #00ff66;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 28px;
            border: 1px solid #00ff66;
            border-radius: 14px;
            background: #0b0b0b;
            box-shadow: 0 0 18px rgba(0, 255, 102, 0.25);
        }

        h1, h2 {
            margin-top: 0;
            color: #00ff88;
        }

        label {
            font-weight: bold;
            color: #00ff66;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 16px;
            border: 1px solid #00ff66;
            border-radius: 8px;
            background: #000;
            color: #00ff99;
            box-sizing: border-box;
        }

        button,
        .button {
            display: inline-block;
            background: #00ff66;
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        button:hover,
        .button:hover {
            background: #33ff85;
            text-decoration: none;
        }

        a {
            color: #66ffad;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .link {
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ site_name }}</h1>
        <h2>Leave an anonymous message</h2>

        <form method="post">
            {% csrf_token %}
            <label>Username:</label>
            <input type="text" name="username" required>

            <label>Message:</label>
            <textarea name="message" rows="5" required></textarea>

            <button type="submit">Send</button>
        </form>

        <p class="link">
            <a class="button" href="{% url 'index' %}">Open SmartOneText</a>
        </p>

        <p class="link">
            <a href="{% url 'feed' %}">View all messages</a>
        </p>
    </div>
</body>
</html>
